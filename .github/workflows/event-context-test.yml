name: event-context-test

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Test flux_shell_add_event_context
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_COUNT: 4
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build test plugin image
        run: |
          cd event-context-test
          docker build -t event-context-test:latest .

      - name: Run test in single container
        run: |
          docker run --rm event-context-test:latest bash -c "cd /home/fluxuser && flux start ./run_test.sh"

      - name: Show results
        if: always()
        run: echo "Check output above for test_value in eventlog"
