name: flux-event-watch-test

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{github.ref}}-${{github.run_number}}
  cancel-in-progress: true

jobs:
  event-watch-test:
    name: Flux Event Watch Test (32 nodes)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_COUNT: 32
    steps:
      - name: Check out reproducer
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set short SHA for artifact naming
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6
        with:
          version: latest

      - name: Generate docker-compose.yml for ${{ env.NODE_COUNT }} nodes
        run: |
          cd docker
          ./generate_compose.sh ${{ env.NODE_COUNT }}

      - name: Build flux-event-watch-test image
        run: |
          cd docker
          docker compose --progress=plain build

      - name: Bring cluster up
        run: |
          cd docker
          docker compose up -d --wait --wait-timeout 300

      - name: Verify plugin is installed and loadable
        run: |
          echo "=== Checking plugin installation ==="

          # Check if plugin file exists
          echo "Checking if plugin exists..."
          docker exec node-1 bash -c "ls -lh /usr/lib/flux/shell/flux-event-watch-test.so"

          # Check if it's a valid ELF shared library
          echo ""
          echo "Checking if it's a valid shared library..."
          docker exec node-1 bash -c "file /usr/lib/flux/shell/flux-event-watch-test.so"

          # Check for required symbols
          echo ""
          echo "Checking for flux_plugin_init symbol..."
          docker exec node-1 bash -c "nm -D /usr/lib/flux/shell/flux-event-watch-test.so | grep flux_plugin_init || echo 'WARNING: flux_plugin_init not found'"

          # Check build timestamp in container
          echo ""
          echo "Checking plugin build timestamp..."
          docker exec node-1 bash -c "stat /usr/lib/flux/shell/flux-event-watch-test.so"

          # Check source file in container
          echo ""
          echo "Checking source file modification time..."
          docker exec node-1 bash -c "stat /home/fluxuser/flux-event-watch-test.c"

          # Verify the source has the absolute path fix
          echo ""
          echo "Verifying source contains absolute path fix..."
          docker exec node-1 bash -c "grep '/home/fluxuser/event_watch_output' /home/fluxuser/flux-event-watch-test.c || echo 'ERROR: Absolute path not found in source!'"

          # Try to see what flux shell plugins are available
          echo ""
          echo "Listing all flux shell plugins..."
          docker exec node-1 bash -c "ls -lh /usr/lib/flux/shell/"

      - name: Capture node-1 logs on startup failure
        if: failure()
        run: |
          echo "=== Node-1 container logs ==="
          docker logs node-1 2>&1 || echo "Could not get node-1 logs"
          echo ""
          echo "=== Node-1 container status ==="
          docker ps -a | grep node-1 || echo "Node-1 not found in container list"
          echo ""
          echo "=== Node-1 healthcheck status ==="
          docker inspect node-1 --format='{{json .State.Health}}' || echo "Could not get health status"

      - name: Run event watch test iterations
        run: |
          # Configuration
          ITERATION_TIMEOUT_SECONDS=60
          MAX_ITERATIONS=50
          NODE_COUNT=${{ env.NODE_COUNT }}

          # Generate node list dynamically
          NODE_LIST=$(seq -f "node-%.0f" 1 $NODE_COUNT | tr '\n' ' ')
          echo "Node list: ${NODE_LIST}"

          # Create artifact staging directory
          mkdir -p /tmp/artifacts/iterations
          mkdir -p /tmp/artifacts/analysis

          echo "Starting test iterations at $(date)"
          echo "Configuration: timeout=${ITERATION_TIMEOUT_SECONDS}s, max_iterations=${MAX_ITERATIONS}, ranks=${NODE_COUNT}"

          success_count=0
          timeout_count=0
          found_bug=false

          for i in $(seq 1 $MAX_ITERATIONS); do
            echo ""
            echo "=== Iteration $i at $(date) ==="

            # Create directory for this iteration
            mkdir -p /tmp/artifacts/iterations/iter_${i}

            # Run test with timeout
            # IMPORTANT: flux alloc is INSIDE the loop per user requirement
            if timeout ${ITERATION_TIMEOUT_SECONDS} docker exec node-1 bash -c \
                "cd /home/fluxuser && NODES=\${workers} ./run_test.sh" \
                > /tmp/artifacts/iterations/iter_${i}/stdout.log 2>&1; then

              # ===== SUCCESS =====
              echo "Iteration $i: COMPLETED"
              success_count=$((success_count + 1))

              # Collect log files from all containers
              echo "  Collecting event watch logs from all nodes..."
              for node in $NODE_LIST; do
                echo "    Collecting logs from ${node}..."
                mkdir -p /tmp/artifacts/iterations/iter_${i}/${node}

                # List what files exist
                docker exec ${node} bash -c \
                  "cd /tmp && (ls -la event_watch_output.* 2>&1 | grep -vE 'cannot access|No such file' || echo 'No event watch log files found')" \
                  > /tmp/artifacts/iterations/iter_${i}/${node}/file_list.txt 2>&1

                # Copy each event_watch_output file
                for logfile in $(docker exec ${node} bash -c \
                  "cd /tmp && ls event_watch_output.* 2>/dev/null || true"); do
                  docker cp ${node}:/tmp/${logfile} \
                    /tmp/artifacts/iterations/iter_${i}/${node}/ 2>/dev/null || true
                done
              done

              # Analyze all log files to check if all ranks got callbacks
              echo "  Checking callback delivery..."

              # Count how many ranks registered watches
              registered_count=$(grep -ch "\[REGISTERED rank=" /tmp/artifacts/iterations/iter_${i}/*/event_watch_output.* 2>/dev/null | awk '{s+=$1} END {print s+0}' || echo "0")

              # Count how many ranks reported success
              success_rank_count=$(grep -ch "\[SUCCESS rank=" /tmp/artifacts/iterations/iter_${i}/*/event_watch_output.* 2>/dev/null | awk '{s+=$1} END {print s+0}' || echo "0")

              echo "  Registered: ${registered_count}, Successful: ${success_rank_count}"

              if [ "$success_rank_count" -lt "$NODE_COUNT" ]; then
                echo "  *** BUG DETECTED: Only ${success_rank_count}/${NODE_COUNT} ranks received callbacks ***"
                found_bug=true

                # Collect detailed diagnostics
                mkdir -p /tmp/artifacts/iterations/iter_${i}/diagnostics

                # Identify which ranks failed
                for rank in $(seq 0 $((NODE_COUNT - 1))); do
                  if ! grep -q "\[SUCCESS rank=${rank}\]" /tmp/artifacts/iterations/iter_${i}/*/event_watch_output.* 2>/dev/null; then
                    echo "    Rank ${rank} FAILED to receive callback"
                    echo "${rank}" >> /tmp/artifacts/iterations/iter_${i}/diagnostics/failed_ranks.txt
                  fi
                done

                # Collect flux diagnostics from all nodes
                echo "    Collecting diagnostics from all nodes..."

                for node in $NODE_LIST; do
                  echo "      Collecting from ${node}..."
                  mkdir -p /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}

                  # Get job list
                  docker exec ${node} bash -c \
                    "flux jobs -a -o '{id} {name} {status} {t_submit}' 2>&1 || echo 'flux jobs failed'" \
                    > /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}/jobs_list.txt 2>&1 || true

                  # Get most recent job eventlogs
                  docker exec ${node} bash -c \
                    "JOBID=\$(flux job last 2>/dev/null); \
                     if [ -n \"\$JOBID\" ]; then \
                       echo \"Job ID: \$JOBID\"; \
                       echo \"=== Main eventlog ===\";\
                       flux job eventlog \$JOBID 2>&1 || echo 'flux job eventlog failed'; \
                       echo \"\"; \
                       echo \"=== Guest exec eventlog ===\";\
                       flux job eventlog -p guest.exec.eventlog \$JOBID 2>&1 || echo 'guest.exec.eventlog failed'; \
                     else \
                       echo 'No recent job found'; \
                     fi" \
                    > /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}/eventlogs.txt 2>&1 || true

                  # Get broker logs
                  docker exec ${node} bash -c \
                    "flux dmesg 2>&1 || echo 'flux dmesg failed'" \
                    > /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}/broker_dmesg.txt 2>&1 || true
                done

                # Stop after first bug detection
                echo "Stopping after bug detection"
                break
              fi

              # Clean up log files for next iteration
              for node in $NODE_LIST; do
                docker exec ${node} bash -c \
                  "cd /tmp && rm -f event_watch_output.*" 2>/dev/null || true
              done

            else
              # ===== TIMEOUT =====
              rc=$?
              if [ $rc -eq 124 ]; then
                echo "Iteration $i: TIMEOUT (hung)"
                timeout_count=$((timeout_count + 1))

                # Collect log files from all containers
                echo "  Collecting event watch logs from all nodes..."
                for node in $NODE_LIST; do
                  echo "    Collecting logs from ${node}..."
                  mkdir -p /tmp/artifacts/iterations/iter_${i}/${node}

                  # Copy each event_watch_output file
                  for logfile in $(docker exec ${node} bash -c \
                    "cd /home/fluxuser && ls event_watch_output.* 2>/dev/null || true"); do
                    docker cp ${node}:/tmp/${logfile} \
                      /tmp/artifacts/iterations/iter_${i}/${node}/ 2>/dev/null || true
                  done
                done

                # Collect diagnostics from all nodes
                echo "  Collecting timeout diagnostics from all nodes..."

                for node in $NODE_LIST; do
                  mkdir -p /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}

                  docker exec ${node} bash -c \
                    "flux jobs -a 2>&1 || echo 'flux jobs failed'" \
                    > /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}/jobs_list.txt 2>&1 || true

                  docker exec ${node} bash -c \
                    "flux dmesg 2>&1 || echo 'flux dmesg failed'" \
                    > /tmp/artifacts/iterations/iter_${i}/diagnostics/${node}/broker_dmesg.txt 2>&1 || true
                done

                echo "Stopping after timeout"
                break
              else
                echo "Iteration $i: FAILED (exit code $rc)"

                # Collect log files to diagnose the failure
                echo "  Collecting event watch logs from all nodes..."
                for node in $NODE_LIST; do
                  echo "    Collecting logs from ${node}..."
                  mkdir -p /tmp/artifacts/iterations/iter_${i}/${node}

                  # List what files exist
                  docker exec ${node} bash -c \
                    "cd /tmp && (ls -la event_watch_output.* 2>&1 | grep -vE 'cannot access|No such file' || echo 'No event watch log files found')" \
                    > /tmp/artifacts/iterations/iter_${i}/${node}/file_list.txt 2>&1

                  # Copy each event_watch_output file
                  for logfile in $(docker exec ${node} bash -c \
                    "cd /tmp && ls event_watch_output.* 2>/dev/null || true"); do
                    docker cp ${node}:/tmp/${logfile} \
                      /tmp/artifacts/iterations/iter_${i}/${node}/ 2>/dev/null || true
                  done
                done

                # Clean up for next iteration
                for node in $NODE_LIST; do
                  docker exec ${node} bash -c \
                    "cd /tmp && rm -f event_watch_output.*" 2>/dev/null || true
                done
              fi
            fi
          done

          echo ""
          echo "Test run completed at $(date)"
          echo "Results: ${success_count} successful, ${timeout_count} timeouts, bug_found=${found_bug}"

          # Generate summary report
          if [ "$found_bug" = "true" ]; then
            actual_behavior="Some ranks did NOT receive callbacks"
          else
            actual_behavior="All ranks received callbacks (bug not reproduced)"
          fi

          echo "Flux Event Watch Test Summary" > /tmp/artifacts/analysis/summary.txt
          echo "==============================" >> /tmp/artifacts/analysis/summary.txt
          echo "Date: $(date)" >> /tmp/artifacts/analysis/summary.txt
          echo "Node count: ${NODE_COUNT}" >> /tmp/artifacts/analysis/summary.txt
          echo "Iterations run: $i" >> /tmp/artifacts/analysis/summary.txt
          echo "" >> /tmp/artifacts/analysis/summary.txt
          echo "Results:" >> /tmp/artifacts/analysis/summary.txt
          echo "- Successful iterations: ${success_count}" >> /tmp/artifacts/analysis/summary.txt
          echo "- Timeouts: ${timeout_count}" >> /tmp/artifacts/analysis/summary.txt
          echo "- Bug detected: ${found_bug}" >> /tmp/artifacts/analysis/summary.txt
          echo "" >> /tmp/artifacts/analysis/summary.txt
          echo "Expected behavior: All ${NODE_COUNT} ranks should receive callbacks and log SUCCESS" >> /tmp/artifacts/analysis/summary.txt
          echo "Actual behavior: ${actual_behavior}" >> /tmp/artifacts/analysis/summary.txt
          echo "" >> /tmp/artifacts/analysis/summary.txt
          echo "See iterations/ directory for per-iteration logs" >> /tmp/artifacts/analysis/summary.txt
          echo "See iterations/iter_N/diagnostics/ for flux diagnostics when bug was detected" >> /tmp/artifacts/analysis/summary.txt

          cat /tmp/artifacts/analysis/summary.txt

          # Exit with error if bug was detected
          if [ "$found_bug" = "true" ]; then
            echo "::error::Event watch callback bug reproduced - not all ranks received callbacks"
            exit 1
          elif [ $timeout_count -gt 0 ]; then
            echo "::error::Test timed out"
            exit 1
          fi

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: event-watch-test-logs-${{ github.run_number }}-${{ env.SHORT_SHA }}
          path: /tmp/artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Bring cluster down
        if: ${{ always() }}
        continue-on-error: true
        run: |
          cd docker
          docker compose down
